services:
  outlier-ui:
    build: .
    container_name: outlier-video-ui
    ports:
      - "3002:80" # UI Port
    depends_on:
      - instagram-extractor
    restart: unless-stopped

  instagram-extractor:
    build:
      context: .
      dockerfile: Dockerfile.extractor
    container_name: instagram-extractor
    ports:
      - "3005:3005"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
